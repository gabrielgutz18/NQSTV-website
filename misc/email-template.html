<!doctype html>
<html>
  <body style="margin:0; padding:0; background:#efeff1; font-family:'Trebuchet MS','Segoe UI',sans-serif; color:#1f1a16;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#efeff1; padding:24px 10px;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px; width:100%; background:#f7f1e8; border:1px solid rgba(67,49,28,0.14); border-radius:12px; overflow:hidden;">
            
            <tr>
              <td style="background:#26231f; padding:20px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                  <tr>
                    <!-- LOGO SECTION -->
                    <td style="width:80px; vertical-align:middle; padding-right:16px;">
                      <img src="" alt="Logo" style="max-width:80px; height:auto; display:block;">
                    </td>
                    <!-- TEXT SECTION -->
                    <td style="vertical-align:middle;">
                      <div style="font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#ddd6ca;">New Inquiry</div>
                      <div style="margin-top:6px; font-size:24px; font-weight:700; color:#ffffff;">
                        i<span style="color:#e48a32;">NQ</span>ui<span style="color:#e48a32;">S</span>i<span style="color:#e48a32;">T</span>i<span style="color:#e48a32;">V</span>e
                      </div>
                      <div style="margin-top:6px; font-size:13px; color:#ddd6ca;">
                        Cost and Contract Training and Consultancy Services
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding:22px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:separate; border-spacing:0 10px;">
                  <tr>
                    <td style="width:170px; font-size:13px; font-weight:700; color:#5a4a3a;">Full Name</td>
                    <td style="font-size:15px; color:#1f1a16;">{{name}}</td>
                  </tr>
                    <td style="width:170px; font-size:13px; font-weight:700; color:#5a4a3a;">Email Address</td>
                    <td style="font-size:15px; color:#1f1a16;">{{email}}</td>
                  </tr>
                  <tr>
                    <td style="width:170px; font-size:13px; font-weight:700; color:#5a4a3a;">Phone Number</td>
                    <td style="font-size:15px; color:#1f1a16;">{{phone}}</td>
                  </tr>
                  <tr>
                    <td style="width:170px; font-size:13px; font-weight:700; color:#5a4a3a;">Service Interested In</td>
                    <td style="font-size:15px; color:#1f1a16;">{{service}}</td>
                  </tr>
                </table>

                <div style="margin-top:16px; font-size:12px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:#5a4a3a;">Message</div>
                <div style="margin-top:8px; background:#efe4d6; border-left:4px solid #e48a32; border-radius:8px; padding:14px 16px; font-size:15px; line-height:1.6; color:#1f1a16; white-space:pre-line;">
                  {{message}}
                </div>
              </td>
            </tr>

            <tr>
              <td style="background:#26231f; padding:12px 24px; font-size:12px; color:#ddd6ca;">
                Sent from website contact form
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
