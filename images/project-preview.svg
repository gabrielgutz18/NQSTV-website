<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-labelledby="title desc">
  <title id="title">Project planning preview</title>
  <desc id="desc">A stylized illustration of a consultant reviewing a building through a window.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf3f6"/>
      <stop offset="100%" stop-color="#cad6dc"/>
