      <stop offset="100%" stop-color="#11273a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="10" stdDeviation="12" flood-color="#1d2d38" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="420" height="520" fill="url(#sky)"/>

  <g opacity=".5">
