    <rect x="38" y="180" width="22" height="16" rx="2"/>
    <rect x="112" y="148" width="36" height="18" rx="2"/>
    <rect x="112" y="182" width="36" height="18" rx="2"/>
    <rect x="196" y="108" width="30" height="14" rx="2"/>
